name: longinvest

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${LONGINVEST_POSTGRES_DB:-longinvest}
      POSTGRES_USER: ${LONGINVEST_POSTGRES_USER:-longinvest}
      POSTGRES_PASSWORD: ${LONGINVEST_POSTGRES_PASSWORD:-longinvest-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    mem_limit: 160m
    security_opt:
      - no-new-privileges:true

  migrate:
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      target: runtime
    command: ["python", "-m", "long_invest.entrypoints.migrate"]
    environment:
      LONGINVEST_ENVIRONMENT: development
      LONGINVEST_DATABASE_URL: postgresql+asyncpg://longinvest_app:${LONGINVEST_DATABASE_APP_PASSWORD:-longinvest-app-local-only}@postgres:5432/${LONGINVEST_POSTGRES_DB:-longinvest}
      LONGINVEST_DATABASE_OWNER_URL: postgresql+asyncpg://${LONGINVEST_POSTGRES_USER:-longinvest}:${LONGINVEST_POSTGRES_PASSWORD:-longinvest-local-only}@postgres:5432/${LONGINVEST_POSTGRES_DB:-longinvest}
      LONGINVEST_DATABASE_APP_ROLE: longinvest_app
      LONGINVEST_DATABASE_APP_PASSWORD: ${LONGINVEST_DATABASE_APP_PASSWORD:-longinvest-app-local-only}
      LONGINVEST_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      target: runtime
    environment:
      LONGINVEST_ENVIRONMENT: development
      LONGINVEST_DATABASE_URL: postgresql+asyncpg://longinvest_app:${LONGINVEST_DATABASE_APP_PASSWORD:-longinvest-app-local-only}@postgres:5432/${LONGINVEST_POSTGRES_DB:-longinvest}
      LONGINVEST_REDIS_URL: redis://redis:6379/0
      LONGINVEST_LOG_FILE: /var/log/longinvest/application.jsonl
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - 127.0.0.1:18080:8000
    volumes:
      - application_logs:/var/log/longinvest
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 384m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "7"

  test:
    profiles: ["test"]
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      target: test
    environment:
      LONGINVEST_ENVIRONMENT: test
      LONGINVEST_DATABASE_URL: postgresql+asyncpg://longinvest_app:${LONGINVEST_DATABASE_APP_PASSWORD:-longinvest-app-local-only}@postgres:5432/${LONGINVEST_POSTGRES_DB:-longinvest}
      LONGINVEST_DATABASE_OWNER_URL: postgresql+asyncpg://${LONGINVEST_POSTGRES_USER:-longinvest}:${LONGINVEST_POSTGRES_PASSWORD:-longinvest-local-only}@postgres:5432/${LONGINVEST_POSTGRES_DB:-longinvest}
      LONGINVEST_DATABASE_APP_ROLE: longinvest_app
      LONGINVEST_REDIS_URL: redis://redis:6379/1
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:
  application_logs:
